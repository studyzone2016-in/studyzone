<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study ZONE | Subscription Plans</title>

<style>
  :root {
    --primary: #1e3a8a;
    --secondary: #2563eb;
    --accent: #059669;
    --bg-light: #f8fafc;
    --text-main: #334155;
  }

  /* CRITICAL: Lock the screen */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; 
    font-family: "Inter", sans-serif;
    background: #f0f4f8;
    color: var(--text-main);
  }

  .container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 8px;
    box-sizing: border-box;
    max-width: 900px;
    margin: 0 auto;
  }

  .top-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
  }

  .top-bar h1 { margin: 0; font-size: 16px; color: #fff; }

  .back-btn {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 10px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .branch-select {
    flex-shrink: 0;
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 6px;
  }

  .branch-select label { font-weight: 600; font-size: 11px; margin-right: 5px; }

  select {
    padding: 4px;
    font-size: 12px;
    border-radius: 4px;
    border: 1px solid #cbd5e1;
  }

  /* FIT CONTENT AREA */
  .scroll-area {
    flex-grow: 1;
    overflow: hidden; /* Strict no scroll */
    display: flex;
    flex-direction: column;
  }

  .content {
    display: none;
    height: 100%;
  }

  .card {
    background: #fff;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid #e2e8f0;
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  th {
    background: #f1f5f9;
    color: var(--primary);
    padding: 6px;
    font-size: 10px;
    text-align: left;
  }

  td {
    padding: 5px 6px;
    border-bottom: 1px solid #f1f5f9;
    font-size: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .plan { font-weight: 700; color: #1e293b; width: 30%; }
  .fees { font-weight: 700; color: var(--accent); width: 25%; text-align: right;}

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Split side-by-side to save height */
    gap: 6px;
  }

  .section {
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }

  .section h2 {
    margin: 0 0 4px 0;
    font-size: 10px;
    color: var(--primary);
    text-transform: uppercase;
  }

  ul { padding-left: 12px; font-size: 9px; color: #475569; margin: 0; }
  ul li { margin-bottom: 2px; }

  /* ADJUST FOR VERY SMALL SCREENS */
  @media (max-height: 600px) {
    .info-grid { display: none; } /* Hide notes if screen is tiny to keep table visible */
  }
</style>
</head>

<body>

<div class="container">
  <header class="top-bar">
    <h1>Plans</h1>
    <a href="index.html" class="back-btn">Back</a>
  </header>

  <div class="branch-select">
    <label for="branch">Location:</label>
    <select id="branch" onchange="showPlans()">
      <option value="">-- Select --</option>
      <option value="west">Dombivli West</option>
      <option value="east">Dombivli East</option>
    </select>
  </div>

  <div class="scroll-area">
    <div class="content" id="plansSection">
      
      <div class="card">
        <table>
          <thead>
            <tr>
              <th style="width: 30%;">Plan</th>
              <th>Slots</th>
              <th style="width: 25%; text-align: right;">30 Days</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="plan">Max</td>
              <td>7 AM – 10 PM</td>
              <td class="fees" id="maxPlan"></td>
            </tr>
            <tr>
              <td class="plan">Light</td>
              <td>One slot</td>
              <td class="fees" id="lightPlan"></td>
            </tr>
            <tr>
              <td class="plan">Flexi</td>
              <td>Two slots</td>
              <td class="fees" id="flexiPlan"></td>
            </tr>
            <tr>
              <td class="plan">Mini</td>
              <td>7-9AM/8-10PM</td>
              <td class="fees" id="miniPlan"></td>
            </tr>
            <tr>
              <td class="plan">Daily</td>
              <td>Full Day</td>
              <td class="fees" id="singleDay"></td>
            </tr>
            <tr>
              <td class="plan">W-End</td>
              <td>Sat & Sun</td>
              <td class="fees" id="weekend"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="info-grid">
        <div class="section">
          <h2>Slots</h2>
          <ul>
            <li>M: 7AM–12PM</li>
            <li>A: 12PM–5PM</li>
            <li>E: 5PM–10PM</li>
          </ul>
        </div>
        <div class="section">
          <h2>Notes</h2>
          <ul>
            <li>Slot entry strictly.</li>
            <li>Reg mandatory.</li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function showPlans() {
  const branch = document.getElementById("branch").value;
  const section = document.getElementById("plansSection");
  
  const pricing = {
    west: { max: "₹1,890", light: "₹1,230", flexi: "₹1,560", mini: "₹750", single: "₹150", week: "₹1,250" },
    east: { max: "₹2,880", light: "₹1,650", flexi: "₹2,280", mini: "₹1,200", single: "₹250", week: "₹2,000" }
  };

  if (!branch) { section.style.display = "none"; return; }

  const data = pricing[branch];
  document.getElementById("maxPlan").innerText = data.max;
  document.getElementById("lightPlan").innerText = data.light;
  document.getElementById("flexiPlan").innerText = data.flexi;
  document.getElementById("miniPlan").innerText = data.mini;
  document.getElementById("singleDay").innerText = data.single;
  document.getElementById("weekend").innerText = data.week;

  section.style.display = "block";
}
</script>

</body>
</html>
